<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - El Picantito</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--Icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!--CSS externo-->
    <link rel="stylesheet" href="/styles/css/dark-hc.css">
    <link rel="stylesheet" href="/styles/styles.css">
</head>

<body class="dark-high-contrast auth-page">
    <main class="auth-wrapper">
        <div class="auth-card">
            <section class="auth-left">
                <h1 class="auth-title">Bienvenido de vuelta</h1>
                <p class="auth-sub">Inicia sesión para continuar disfrutando de nuestros auténticos tacos mexicanos y acceder a promociones exclusivas.</p>
            </section>

            <aside class="auth-right">
                <div class="form-panel">
                    <h3>Iniciar Sesión</h3>

                    <!-- Mensajes de error/éxito aquí -->

                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label for="nombreUsuario" class="form-label fw-semibold">
                                <i class="bi bi-person me-2 text-warning"></i>Nombre de Usuario
                            </label>
                            <input type="text" class="form-control auth" id="nombreUsuario" name="nombreUsuario"
                                   placeholder="Ingresa tu nombre de usuario" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-2 text-warning"></i>Contraseña
                            </label>
                            <input type="password" class="form-control auth" id="password" name="password"
                                   placeholder="Ingresa tu contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-auth">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                        </button>
                    </form>

                    <div class="auth-links">
                        <p class="mb-2">
                            <a href="/home">← Volver al inicio</a>
                        </p>
                        <p class="text-muted mb-2">¿No tienes cuenta?</p>
                        <a href="/registry" class="btn btn-outline-warning w-100">
                            <i class="bi bi-person-plus me-2"></i>Crear Cuenta Nueva
                        </a>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
