<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - El Picantito</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!--CSS externo-->
    <link rel="stylesheet" href="/styles/css/dark-hc.css">
    <link rel="stylesheet" href="/styles/styles.css">
</head>

<body class="dark-high-contrast auth-page">
    <main class="auth-wrapper">
        <div class="auth-card registry">
            <section class="auth-left registry">
                <h1 class="auth-title registry">Únete a la familia</h1>
                <p class="auth-sub">Crea tu cuenta para disfrutar de nuestros servicios, hacer pedidos personalizados y acceder a promociones exclusivas.</p>
            </section>

            <aside class="auth-right registry">
                <div class="form-panel registry">
                    <h3 class="registry">Crear Cuenta</h3>
                    
                    <form action="/registry" method="post" novalidate>
                        <div class="form-group registry">
                            <label for="nombreCompleto" class="form-label registry">Nombre completo</label>
                            <input id="nombreCompleto" name="nombreCompleto" type="text" class="form-control registry" 
                                   placeholder="Ej: Juan Pérez García" required>
                        </div>
                        
                        <div class="form-group registry">
                            <label for="nombreUsuario" class="form-label registry">Nombre de usuario</label>
                            <input id="nombreUsuario" name="nombreUsuario" type="text" class="form-control registry" 
                                   placeholder="Ej: juanperez" required>
                        </div>
                        
                        <div class="form-group registry">
                            <label for="email" class="form-label registry">Correo electrónico</label>
                            <input id="email" name="email" type="email" class="form-control registry" 
                                   placeholder="tu@email.com" required>
                        </div>
                        
                        <div class="form-group registry">
                            <label for="password" class="form-label registry">Contraseña</label>
                            <input id="password" name="password" type="password" class="form-control registry" 
                                   placeholder="Mínimo 6 caracteres" required>
                        </div>
                        
                        <div class="checkbox-container">
                            <input id="terminos" type="checkbox" required>
                            <label for="terminos">
                                Acepto los <a href="#">términos y condiciones</a>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-auth registry">
                            <i class="bi bi-person-plus me-2"></i>Crear mi cuenta
                        </button>
                    </form>

                    <div class="auth-links registry">
                        <p class="mb-2">
                            <a href="/home">← Volver al inicio</a>
                        </p>
                        <p class="text-muted mb-2">¿Ya tienes cuenta?</p>
                        <a href="/login">Inicia sesión aquí</a>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
